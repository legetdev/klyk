name: Publish to PyPI

# Publishes klyk to PyPI when a GitHub Release is published, via PyPI Trusted
# Publishing (OIDC). No API token is stored anywhere — PyPI verifies a short-
# lived identity GitHub mints for this exact repo + workflow + environment.
#
# ONE-TIME SETUP (PyPI web UI → Account → Publishing → "Add a pending publisher"):
#   PyPI Project Name:  klyk
#   Owner:              legetdev
#   Repository name:    klyk
#   Workflow filename:  publish-pypi.yml
#   Environment name:   pypi
# (Already configured.) After that, every published GitHub Release auto-uploads.
#
# Actions are pinned to commit SHAs (not moving tags) so a hijacked action tag
# can't swap code into this token-minting job. The trailing comment is the tag.

on:
  workflow_dispatch: {}          # manual re-run (e.g. retry a failed publish)
  release:
    types: [published]

permissions:
  contents: read
  id-token: write                # required for OIDC Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Build wheel + sdist and validate metadata
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
